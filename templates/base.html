<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI-Self-Evolution{% endblock %}</title>
    <style>
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --ink: #f1f5f9;
            --muted: #94a3b8;
            --rule: #334155;
            --accent: #3b82f6;
            --accent2: #8b5cf6;
            --good: #10b981;
            --warn: #f59e0b;
            --bad: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Header */
        header {
            background: var(--bg2);
            border-bottom: 1px solid var(--rule);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }
        .logo span { color: var(--accent2); }
        nav { display: flex; gap: 24px; }
        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: var(--ink); }

        /* Main */
        main { padding: 32px 0; min-height: calc(100vh - 140px); }

        /* Cards */
        .card {
            background: var(--bg2);
            border: 1px solid var(--rule);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .card-title { font-size: 18px; font-weight: 600; }
        .card-meta { color: var(--muted); font-size: 13px; }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-l1 { background: rgba(59,130,246,.15); color: var(--accent); }
        .badge-l2 { background: rgba(139,92,246,.15); color: var(--accent2); }
        .badge-l3 { background: rgba(245,158,11,.15); color: var(--warn); }
        .badge-source {
            background: var(--bg);
            color: var(--muted);
            border: 1px solid var(--rule);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary {
            background: var(--bg2);
            color: var(--ink);
            border: 1px solid var(--rule);
        }
        .btn-secondary:hover { border-color: var(--accent); }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--rule);
            border-radius: 8px;
            color: var(--ink);
            font-size: 14px;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Article list */
        .article-list { display: flex; flex-direction: column; gap: 12px; }
        .article-item {
            background: var(--bg2);
            border: 1px solid var(--rule);
            border-radius: 10px;
            padding: 16px 20px;
            transition: border-color 0.2s;
        }
        .article-item:hover { border-color: var(--accent); }
        .article-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--ink);
            text-decoration: none;
            display: block;
        }
        .article-title:hover { color: var(--accent); }
        .article-summary {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .article-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--rule);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            color: var(--muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .alert-success {
            background: rgba(16,185,129,.1);
            border: 1px solid rgba(16,185,129,.3);
            color: var(--good);
        }
        .alert-error {
            background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.3);
            color: var(--bad);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state h3 { margin-bottom: 8px; color: var(--ink); }

        /* Footer */
        footer {
            border-top: 1px solid var(--rule);
            padding: 20px 0;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 12px; }
            nav { flex-wrap: wrap; justify-content: center; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">AI<span>-Self-Evolution</span></a>
                <nav>
                    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">简报</a>
                    <a href="/knowledge" class="{% if request.url.path == '/knowledge' %}active{% endif %}">知识库</a>
                    <a href="/search" class="{% if request.url.path == '/search' %}active{% endif %}">搜索</a>
                    <a href="/updates" class="{% if request.url.path == '/updates' %}active{% endif %}">更新</a>
                    <a href="/snapshots" class="{% if request.url.path == '/snapshots' %}active{% endif %}">版本</a>
                    <a href="/crawl" class="{% if request.url.path == '/crawl' %}active{% endif %}">补爬</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>AI-Self-Evolution · 让知识库自己长大</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
