<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Self-Evolution — AI前沿，翻译成人话</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2236;
  --ink: #e2e8f0;
  --muted: #64748b;
  --rule: #1e293b;
  --accent: #00d4aa;
  --accent2: #3b82f6;
  --accent3: #8b5cf6;
  --good: #22c55e;
  --warn: #f59e0b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  font-size: 14px;
  overflow-x: hidden;
}

/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
  border-bottom: 1px solid var(--rule);
  padding: 20px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
.header .tagline { font-size: 12px; color: var(--muted); margin-top: 2px; }
.header-stats { display: flex; gap: 20px; }
.header-stat { text-align: center; }
.header-stat .num { font-size: 22px; font-weight: 700; color: var(--accent); font-family: 'Space Mono', monospace; }
.header-stat .label { font-size: 11px; color: var(--muted); }

/* ===== Search ===== */
.search-bar {
  max-width: 1400px;
  margin: 16px auto;
  padding: 0 24px;
  display: flex;
  gap: 12px;
}
.search-bar input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 10px 16px;
  color: var(--ink);
  font-size: 14px;
  outline: none;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--muted); }
.search-bar button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
}
.search-bar button:hover { opacity: 0.9; }

/* ===== Layout ===== */
.main { max-width: 1400px; margin: 0 auto; padding: 0 24px 40px; display: flex; gap: 20px; }

/* Sidebar */
.sidebar { width: 240px; flex-shrink: 0; }
.sidebar-section { margin-bottom: 20px; }
.sidebar-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  padding-left: 8px;
  border-left: 2px solid var(--accent);
}
.topic-list { list-style: none; }
.topic-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.2s;
  border: 1px solid transparent;
}
.topic-item:hover { background: var(--bg2); border-color: var(--rule); }
.topic-item.active { background: rgba(0,212,170,0.1); border-color: var(--accent); }
.topic-item .name { font-size: 13px; font-weight: 500; }
.topic-item .count {
  font-size: 11px;
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 999px;
  color: var(--muted);
}
.topic-item.active .count { background: var(--accent); color: var(--bg); }

/* ===== Content Area ===== */
.content-area { flex: 1; min-width: 0; }

/* ===== Three-Tab Navigation ===== */
.tab-nav {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 4px;
}
.tab-nav button {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--muted);
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
}
.tab-nav button:hover { color: var(--ink); background: var(--bg3); }
.tab-nav button.active { background: var(--accent); color: var(--bg); }

/* ===== View Containers ===== */
.view-container { display: none; }
.view-container.active { display: block; }

/* ===== Weekly Briefing View ===== */
.briefing-header {
  margin-bottom: 24px;
}
.briefing-header h2 {
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.briefing-header .date-range {
  font-size: 13px;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
}
.briefing-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
.briefing-card {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 20px 24px;
  border-left: 4px solid var(--accent);
  transition: border-color 0.2s, transform 0.15s;
  cursor: default;
}
.briefing-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.briefing-card:nth-child(2) { border-left-color: var(--accent2); }
.briefing-card:nth-child(3) { border-left-color: var(--accent3); }
.briefing-card:nth-child(4) { border-left-color: var(--warn); }
.briefing-card:nth-child(5) { border-left-color: var(--good); }
.briefing-card:nth-child(6) { border-left-color: var(--accent); }
.briefing-card:nth-child(7) { border-left-color: var(--accent2); }
.briefing-card:nth-child(8) { border-left-color: var(--accent3); }
.briefing-card:nth-child(9) { border-left-color: var(--warn); }
.briefing-card:nth-child(10) { border-left-color: var(--good); }
.briefing-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 10px;
  line-height: 1.4;
}
.briefing-explanation {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.8;
  margin-bottom: 12px;
  opacity: 0.9;
}
.briefing-concept-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.briefing-concept-tag {
  font-size: 11px;
  padding: 3px 10px;
  background: rgba(0,212,170,0.12);
  color: var(--accent);
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.2s;
  border: 1px solid rgba(0,212,170,0.2);
}
.briefing-concept-tag:hover {
  background: rgba(0,212,170,0.25);
}
.briefing-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--muted);
}
.briefing-meta a {
  color: var(--accent2);
  text-decoration: none;
}
.briefing-meta a:hover { text-decoration: underline; }

/* ===== Concept Dictionary View ===== */
.concept-dict-header {
  margin-bottom: 24px;
}
.concept-dict-header h2 {
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.concept-dict-header .subtitle {
  font-size: 13px;
  color: var(--muted);
}
.concept-dict-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.concept-dict-card {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
}
.concept-dict-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.concept-dict-card .cd-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.concept-dict-one-liner {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.7;
  margin-bottom: 12px;
  opacity: 0.9;
}
.concept-dict-card .cd-expand {
  font-size: 12px;
  color: var(--accent2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.concept-dict-card .cd-expand::after {
  content: '\25BC';
  font-size: 8px;
  transition: transform 0.2s;
}
.concept-dict-card.expanded .cd-expand::after {
  transform: rotate(180deg);
}
.concept-dict-detail {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
  font-size: 13px;
  line-height: 1.8;
  color: var(--ink);
}
.concept-dict-card.expanded .concept-dict-detail {
  display: block;
}
.concept-dict-detail .cd-section {
  margin-bottom: 12px;
}
.concept-dict-detail .cd-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.concept-dict-detail .cd-scenarios li {
  margin-bottom: 4px;
  padding-left: 16px;
  position: relative;
}
.concept-dict-detail .cd-scenarios li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent);
}

/* ===== Deep Explore View (original matrix + timeline) ===== */
.explore-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.explore-title { font-size: 16px; font-weight: 700; }
.explore-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.view-toggle { display: flex; gap: 4px; }
.view-toggle button {
  background: var(--bg2);
  border: 1px solid var(--rule);
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}
.view-toggle button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* Matrix Grid */
.matrix-grid {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 12px;
  overflow: hidden;
}
.matrix-row { display: flex; border-bottom: 1px solid var(--rule); }
.matrix-row:last-child { border-bottom: none; }
.matrix-cell {
  flex: 1;
  min-width: 80px;
  padding: 16px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  border-right: 1px solid var(--rule);
  position: relative;
}
.matrix-cell:last-child { border-right: none; }
.matrix-cell:hover { transform: scale(1.05); z-index: 10; }
.matrix-cell .count { font-size: 20px; font-weight: 700; font-family: 'Space Mono', monospace; }
.matrix-cell .year-label { font-size: 10px; color: var(--muted); margin-top: 4px; }
.matrix-cell.empty { opacity: 0.3; cursor: default; }
.matrix-cell.empty:hover { transform: none; }

.matrix-cell.c1 { background: rgba(0,212,170,0.08); }
.matrix-cell.c2 { background: rgba(0,212,170,0.15); }
.matrix-cell.c3 { background: rgba(0,212,170,0.25); }
.matrix-cell.c4 { background: rgba(0,212,170,0.35); }
.matrix-cell.c5 { background: rgba(0,212,170,0.5); }
.matrix-cell.c1 .count { color: rgba(0,212,170,0.5); }
.matrix-cell.c2 .count { color: rgba(0,212,170,0.7); }
.matrix-cell.c3 .count { color: var(--accent); }
.matrix-cell.c4 .count { color: #00f0c0; }
.matrix-cell.c5 .count { color: #fff; text-shadow: 0 0 10px var(--accent); }

.matrix-row-label {
  width: 140px;
  flex-shrink: 0;
  padding: 16px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  background: var(--bg3);
  border-right: 1px solid var(--rule);
  display: flex;
  align-items: center;
}
.matrix-header-row { display: flex; background: var(--bg3); border-bottom: 1px solid var(--rule); }
.matrix-header-cell {
  flex: 1;
  min-width: 80px;
  padding: 10px 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  border-right: 1px solid var(--rule);
}
.matrix-header-cell:last-child { border-right: none; }
.matrix-corner {
  width: 140px;
  flex-shrink: 0;
  padding: 10px 12px;
  font-size: 11px;
  color: var(--muted);
  border-right: 1px solid var(--rule);
}

/* ===== Topic Detail Panel ===== */
.detail-panel {
  display: none;
  position: fixed;
  top: 0;
  right: 0;
  width: 520px;
  max-width: 90vw;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--rule);
  z-index: 200;
  overflow-y: auto;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

.detail-header {
  padding: 24px;
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  background: var(--bg2);
  z-index: 10;
}
.detail-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: 1px solid var(--rule);
  color: var(--muted);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
}
.detail-close:hover { color: var(--ink); border-color: var(--accent); }
.detail-title { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.detail-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
.detail-meta { display: flex; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--muted); }

.detail-body { padding: 20px 24px; }
.detail-section { margin-bottom: 28px; }
.detail-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.detail-section-title::before {
  content: '';
  width: 4px;
  height: 16px;
  background: var(--accent);
  border-radius: 2px;
}

/* Concept card */
.concept-card {
  background: var(--bg3);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 16px;
  font-size: 13px;
  line-height: 1.8;
  color: var(--ink);
}
.concept-card p { margin-bottom: 8px; }
.concept-card p:last-child { margin-bottom: 0; }
.concept-card strong { color: var(--accent); }

/* Article list in detail */
.article-list { list-style: none; }
.article-item {
  background: var(--bg3);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.article-item:hover { border-color: var(--accent); }
.article-item-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.article-item-title .relevance {
  font-size: 10px;
  background: rgba(0,212,170,0.15);
  color: var(--accent);
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}
.article-item-summary {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 8px;
}
.article-item-meta {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--muted);
}
.article-item-meta a {
  color: var(--accent2);
  text-decoration: none;
}
.article-item-meta a:hover { text-decoration: underline; }

/* Timeline in detail */
.timeline-list { list-style: none; }
.timeline-item {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--rule);
}
.timeline-item:last-child { border-bottom: none; }
.timeline-date {
  width: 80px;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  font-family: 'Space Mono', monospace;
}
.timeline-content { font-size: 13px; color: var(--ink); }
.timeline-content .event { font-weight: 500; }
.timeline-content .desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Overlay */
.overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 150;
}

/* ===== Concept Section in Sidebar ===== */
.concept-section { margin-bottom: 20px; }
.concept-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 8px;
  cursor: pointer;
  color: var(--ink);
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
  user-select: none;
}
.concept-toggle:hover { border-color: var(--accent); }
.concept-toggle .arrow {
  font-size: 10px;
  color: var(--muted);
  transition: transform 0.2s;
}
.concept-toggle .arrow.open { transform: rotate(90deg); }
.concept-list {
  list-style: none;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.concept-list.open { max-height: 2000px; }
.concept-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: background 0.2s;
  border: 1px solid transparent;
}
.concept-item:hover { background: var(--bg2); border-color: var(--rule); }
.concept-item .name { font-size: 13px; font-weight: 500; }
.concept-one-liner { font-size: 11px; color: var(--muted); line-height: 1.5; }
.concept-status {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
  vertical-align: middle;
}
.concept-status-active { background: rgba(34,197,94,0.15); color: var(--good); }
.concept-status-absorbed { background: rgba(245,158,11,0.15); color: var(--warn); }
.concept-status-archived { background: rgba(100,116,139,0.15); color: var(--muted); }

/* Concept detail in panel */
.concept-detail-name { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.concept-detail-liner { font-size: 14px; color: var(--ink); margin-bottom: 12px; font-style: italic; }
.concept-detail-desc { font-size: 13px; color: var(--ink); line-height: 1.8; margin-bottom: 16px; }
.concept-detail-scenarios { font-size: 13px; color: var(--ink); line-height: 1.8; }
.concept-detail-scenarios li { margin-bottom: 6px; }
.concept-evolution {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 13px;
  margin-top: 8px;
}
.concept-evolution .evo-node {
  padding: 6px 14px;
  background: var(--bg3);
  border: 1px solid var(--rule);
  border-radius: 8px;
  color: var(--ink);
}
.concept-evolution .evo-node.current {
  border-color: var(--accent);
  background: rgba(0,212,170,0.1);
  color: var(--accent);
  font-weight: 600;
}
.concept-evolution .evo-arrow { color: var(--muted); font-size: 16px; }
.concept-related-topics {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.concept-related-topics .topic-tag {
  font-size: 11px;
  padding: 3px 10px;
  background: rgba(59,130,246,0.15);
  color: var(--accent2);
  border-radius: 999px;
  cursor: pointer;
}
.concept-related-topics .topic-tag:hover { background: rgba(59,130,246,0.3); }

/* Concept summary in topic detail */
.concept-summary-card {
  background: var(--bg3);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.concept-summary-card:hover { border-color: var(--accent); }
.concept-summary-card .cs-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}
.concept-summary-card .cs-liner {
  font-size: 12px;
  color: var(--ink);
  margin-bottom: 4px;
}
.concept-summary-card .cs-desc {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.5;
}

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .main { flex-direction: column; }
  .sidebar { width: 100%; }
  .topic-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .topic-item { flex: 1; min-width: 140px; }
  .concept-dict-grid { grid-template-columns: 1fr; }
  .matrix-row-label { width: 100px; font-size: 11px; }
  .matrix-corner { width: 100px; }
  .detail-panel { width: 100%; max-width: 100%; }
}

@media (max-width: 600px) {
  .header-stats { display: none; }
  .matrix-cell { padding: 10px 4px; min-width: 50px; }
  .matrix-cell .count { font-size: 14px; }
  .matrix-row-label { width: 80px; padding: 10px 6px; font-size: 10px; }
  .tab-nav button { font-size: 12px; padding: 8px 10px; }
  .briefing-title { font-size: 15px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div>
      <h1>AI-Self-Evolution</h1>
