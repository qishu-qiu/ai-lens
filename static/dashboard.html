// ===== STATE =====
let currentView = 'briefing';
let currentExploreView = 'matrix';
let selectedTopic = null;

// ===== VIEW SWITCH (3 tabs) =====
function switchView(view, btn) {
  currentView = view;
  // Update tab buttons
  document.querySelectorAll('#tab-nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Show/hide views
  document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
  const targetView = document.getElementById('view-' + view);
  if (targetView) targetView.classList.add('active');
  // Render content
  if (view === 'briefing') {
    renderWeeklyBriefing();
  } else if (view === 'concepts') {
    renderConceptDictionary();
  } else if (view === 'explore') {
    if (currentExploreView === 'timeline') {
      renderTimeline();
    } else {
      renderMatrix();
    }
  }
}

// ===== EXPLORE SUB-VIEW SWITCH =====
function switchExploreView(view, btn) {
  currentExploreView = view;
  document.querySelectorAll('#explore-toggle button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (view === 'timeline') {
    renderTimeline();
  } else {
    renderMatrix();
  }
}

// ===== RENDER WEEKLY BRIEFING =====
function renderWeeklyBriefing() {
  const grid = document.getElementById('briefing-grid');
  const dateRangeEl = document.getElementById('briefing-date-range');

  // Use WEEKLY_BRIEFING if populated, otherwise generate from KNOWLEDGE_BASE
  let briefingItems = [];
  if (WEEKLY_BRIEFING.length > 0) {
    briefingItems = WEEKLY_BRIEFING;
  } else {
    // Auto-generate from latest articles in KNOWLEDGE_BASE
    const now = new Date();
    const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

    // Find the latest date range in the data
    const allDates = KNOWLEDGE_BASE
      .map(a => a.date || a.published_at || '')
      .filter(d => d.length > 0)
      .sort()
      .reverse();

    if (allDates.length === 0) {
      grid.innerHTML = '<div style="padding: 60px; text-align: center; color: var(--muted);"><div style="font-size: 48px; margin-bottom: 16px;">&#128218;</div><div style="font-size: 16px; margin-bottom: 8px;">暂无简报数据</div><div style="font-size: 13px;">请运行 update_dashboard.py 生成数据</div></div>';
      return;
    }

    const latestDate = allDates[0];
    // Get all articles from the most recent date batch
    const latestArticles = KNOWLEDGE_BASE.filter(a => (a.date || a.published_at || '') === latestDate);

    // Pick top articles for briefing (prioritize milestone/level 3, then unique topics)
    const seenTopics = new Set();
    const selected = [];

    // First pass: milestones (level >= 2)
    for (const a of latestArticles) {
      if (selected.length >= 8) break;
      const topics = a.topics || [];
      const hasNewTopic = topics.some(t => !seenTopics.has(t));
      if (a.level >= 2 || hasNewTopic) {
        selected.push(a);
        topics.forEach(t => seenTopics.add(t));
      }
    }
    // Second pass: fill remaining with unique articles
    for (const a of latestArticles) {
      if (selected.length >= 8) break;
      if (!selected.includes(a)) {
        selected.push(a);
      }
    }

    // Generate human-readable briefing
    const topicConceptMap = {};
    CONCEPTS.forEach(c => {
      if (c.related_topics) {
        c.related_topics.forEach(t => {
          topicConceptMap[t] = c.name;
        });
      }
    });

    briefingItems = selected.slice(0, 8).map(a => {
      const summary = a.chinese_summary || a.summary || '';
      const topics = a.topics || [];
      const concepts = topics.map(t => topicConceptMap[t] || t).filter((v, i, arr) => arr.indexOf(v) === i);

      // Generate a human-friendly title
      let title = a.title;
      // If title is English and has Chinese summary, use a condensed version
      if (summary.length > 0) {
        const firstSentence = summary.split(/[。！？]/)[0];
        if (firstSentence.length > 5 && firstSentence.length < 60) {
          title = firstSentence + '。';
        }
      }

      // Generate explanation (what is it, why it matters, how to use)
      let explanation = '';
      if (summary.length > 0) {
        // Extract key info
        const sentences = summary.split(/[。！？]/).filter(s => s.trim().length > 0);
        if (sentences.length >= 2) {
          explanation = '【这是什么】' + sentences[0] + '。\n【跟你有什么关系】' + sentences[1] + '。';
        } else {
          explanation = summary.substring(0, 150);
        }
      } else {
        explanation = a.title;
      }

      return {
        title: title,
        explanation: explanation,
        concepts: concepts,
        date: a.date || a.published_at || '',
        source_url: a.url || '',
        source: a.source || ''
      };
    });

    // Set date range
    const earliest = latestArticles.length > 0
      ? latestArticles[latestArticles.length - 1].date || latestArticles[latestArticles.length - 1].published_at || latestDate
      : latestDate;
    dateRangeEl.textContent = latestDate + (earliest !== latestDate ? ' ~ ' + earliest : '');
  }

  // Render cards
  if (briefingItems.length === 0) {
    grid.innerHTML = '<div style="padding: 60px; text-align: center; color: var(--muted);"><div style="font-size: 48px; margin-bottom: 16px;">&#128218;</div><div style="font-size: 16px; margin-bottom: 8px;">暂无简报数据</div><div style="font-size: 13px;">请运行 update_dashboard.py 生成数据</div></div>';
    return;
  }

  grid.innerHTML = briefingItems.map((item, idx) => {
    const conceptTags = (item.concepts || []).map(c =>
      `<span class="briefing-concept-tag" onclick="event.stopPropagation(); switchView('concepts', document.querySelectorAll('#tab-nav button')[1]); setTimeout(() => expandConceptCard('${c.replace(/'/g, "\\'")}'), 300);">${c}</span>`
    ).join('');

    const sourceLabel = item.source || '';
    const dateLabel = item.date || '';

    return `
      <div class="briefing-card">
        <div class="briefing-title">${item.title}</div>
        <div class="briefing-explanation">${item.explanation}</div>
        ${conceptTags ? '<div class="briefing-concept-tags">' + conceptTags + '</div>' : ''}
        <div class="briefing-meta">
          <span>${dateLabel} ${sourceLabel ? '· ' + sourceLabel : ''}</span>
          ${item.source_url ? `<a href="${item.source_url}" target="_blank" onclick="event.stopPropagation()">阅读原文 &rarr;</a>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ===== RENDER CONCEPT DICTIONARY =====
function renderConceptDictionary() {
  const grid = document.getElementById('concept-dict-grid');

  if (CONCEPTS.length === 0) {
    grid.innerHTML = '<div style="grid-column: 1/-1; padding: 60px; text-align: center; color: var(--muted);">暂无概念数据</div>';
    return;
  }

  grid.innerHTML = CONCEPTS.map(c => {
    const statusLabel = c.status === 'active' ? '活跃' : c.status === 'absorbed' ? '被吸收' : '归档';
    const statusClass = 'concept-status-' + (c.status || 'active');

    let detailHtml = '';
    if (c.description) {
      detailHtml += `<div class="cd-section"><div class="cd-section-title">详细说明</div><div>${c.description}</div></div>`;
    }
    if (c.scenarios && c.scenarios.length > 0) {
      detailHtml += `<div class="cd-section"><div class="cd-section-title">适用场景</div><ul class="cd-scenarios">${c.scenarios.map(s => '<li>' + s + '</li>').join('')}</ul></div>`;
    }
    if (c.evolution) {
      const evo = c.evolution;
      const hasPre = evo.predecessor && evo.predecessor.trim() !== '';
      const hasSuc = evo.successor && evo.successor.trim() !== '';
      if (hasPre || hasSuc) {
        detailHtml += '<div class="cd-section"><div class="cd-section-title">演进关系</div><div class="concept-evolution">';
        if (hasPre) detailHtml += `<span class="evo-node">${evo.predecessor}</span><span class="evo-arrow">&#8594;</span>`;
        detailHtml += `<span class="evo-node current">${c.name}</span>`;
        if (hasSuc) detailHtml += `<span class="evo-arrow">&#8594;</span><span class="evo-node">${evo.successor}</span>`;
        detailHtml += '</div></div>';
      }
    }

    return `
      <div class="concept-dict-card" id="cd-${c.name.replace(/[^a-zA-Z\u4e00-\u9fff]/g, '_')}" onclick="toggleConceptDictCard(this)">
        <div class="cd-name">
          ${c.name}
          <span class="concept-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="concept-dict-one-liner">${c.one_liner || ''}</div>
        <div class="cd-expand">展开详情</div>
        <div class="concept-dict-detail">${detailHtml}</div>
      </div>
    `;
  }).join('');
}

function toggleConceptDictCard(card) {
  card.classList.toggle('expanded');
  const expandEl = card.querySelector('.cd-expand');
  if (card.classList.contains('expanded')) {
    expandEl.textContent = '收起详情';
  } else {
    expandEl.textContent = '展开详情';
  }
}

function expandConceptCard(conceptName) {
  const cards = document.querySelectorAll('.concept-dict-card');
  cards.forEach(card => {
    const nameEl = card.querySelector('.cd-name');
    if (nameEl && nameEl.textContent.includes(conceptName)) {
      card.classList.add('expanded');
      const expandEl = card.querySelector('.cd-expand');
      if (expandEl) expandEl.textContent = '收起详情';
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });
}

// ===== RENDER MATRIX =====
function renderMatrix() {
  const grid = document.getElementById('matrix-grid');

  // Header row
  let html = '<div class="matrix-header-row">';
  html += '<div class="matrix-corner">主题 \ 年份</div>';
  YEARS.forEach(y => {
    html += `<div class="matrix-header-cell">${y}</div>`;
  });
  html += '</div>';

  // Topic rows
  TOPICS.forEach(topic => {
    html += '<div class="matrix-row">';
    html += `<div class="matrix-row-label">${topic.name}</div>`;

    YEARS.forEach(year => {
      const count = topic.yearCounts?.[year] || 0;
      const intensity = count === 0 ? 'empty' : count >= 10 ? 'c5' : count >= 7 ? 'c4' : count >= 4 ? 'c3' : count >= 2 ? 'c2' : 'c1';

      if (count === 0) {
        html += `<div class="matrix-cell empty"><div class="count">-</div></div>`;
      } else {
        html += `<div class="matrix-cell ${intensity}" onclick="showTopicDetail('${topic.name}', '${year}')">`;
        html += `<div class="count">${count}</div>`;
        html += `<div class="year-label">${year}</div>`;
        html += '</div>';
      }
    });

    html += '</div>';
  });

  grid.innerHTML = html;
}

    <li class="topic-item ${selectedTopic === t.name ? 'active' : ''}" onclick="selectTopic('${t.name}')">
      <span class="name">${t.name}</span>
      <span class="count">${t.totalCount || 0}</span>
    </li>
  `).join('');
}

// ===== SHOW TOPIC DETAIL =====
function showTopicDetail(topicName, year) {
  const topic = TOPICS.find(t => t.name === topicName);
  if (!topic) return;

  const articles = KNOWLEDGE_BASE.filter(a => {
    const articleYear = (a.published_at || a.date || '').substring(0, 4);
    return a.topics?.includes(topicName) && articleYear === year;
  });

  document.getElementById('detail-title').textContent = topicName;
  document.getElementById('detail-desc').textContent = topic.description || 'AI前沿研究主题';
  document.getElementById('detail-count').textContent = `${articles.length} 篇论文`;
  document.getElementById('detail-range').textContent = `${year}年`;

  document.getElementById('detail-concept').innerHTML = `
    <p><strong>${topicName}</strong>是${year}年AI领域的重要研究方向。</p>
    <p>该主题涉及${articles.length}篇相关论文，涵盖${topic.keywords?.join('、') || '多个子方向'}。</p>
    <p>核心贡献包括：${articles.slice(0, 3).map(a => a.chinese_summary || a.summary?.substring(0, 60) || a.title).join('；').substring(0, 200)}...</p>
  `;

  const timelineHtml = articles.slice(0, 8).map(a => {
    const date = (a.published_at || a.date || '').substring(5, 10);
    return `
      <li class="timeline-item">
        <div class="timeline-date">${date}</div>
        <div class="timeline-content">
          <div class="event">${a.title}</div>
          <div class="desc">${(a.chinese_summary || a.summary || '').substring(0, 80)}...</div>
        </div>
      </li>
    `;
  }).join('');
  document.getElementById('detail-timeline').innerHTML = timelineHtml || '<li class="timeline-item"><div class="timeline-content">暂无数据</div></li>';

  const articlesHtml = articles.map(a => `
    <li class="article-item" onclick="window.open('${a.url}', '_blank')">
      <div class="article-item-title">
        <span>${a.title}</span>
        <span class="relevance">${a.relevance || 90}%</span>
      </div>
      <div class="article-item-summary">${(a.chinese_summary || a.summary || '暂无摘要').substring(0, 120)}...</div>
      <div class="article-item-meta">
        <span>${a.source || '未知来源'}</span>
        <span>${a.published_at || a.date || ''}</span>
        <a href="${a.url}" target="_blank" onclick="event.stopPropagation()">阅读原文 &rarr;</a>
      </div>
    </li>
  `).join('');
  document.getElementById('detail-articles').innerHTML = articlesHtml || '<li class="article-item">暂无论文</li>';

  const relatedConcepts = CONCEPTS.filter(c => c.related_topics?.includes(topicName));
  const relatedSection = document.getElementById('section-related-concepts');
  const conceptDetailSection = document.getElementById('section-concept-detail');

  document.getElementById('section-topic-concept').style.display = '';
  document.getElementById('detail-timeline').parentElement.style.display = '';
  document.getElementById('detail-articles').parentElement.style.display = '';

  if (relatedConcepts.length > 0) {
    relatedSection.style.display = '';
    conceptDetailSection.style.display = 'none';
    document.getElementById('detail-related-concepts').innerHTML = relatedConcepts.map(c => `
      <div class="concept-summary-card" onclick="showConceptDetail('${c.name.replace(/'/g, "\\'")}')">
        <div class="cs-name">${c.name} <span class="concept-status concept-status-${c.status || 'active'}">${c.status === 'active' ? '活跃' : c.status === 'absorbed' ? '被吸收' : '归档'}</span></div>
        <div class="cs-liner">${c.one_liner || ''}</div>
        <div class="cs-desc">${(c.description || '').substring(0, 100)}${(c.description || '').length > 100 ? '...' : ''}</div>
      </div>
    `).join('');
  } else {
    relatedSection.style.display = 'none';
    conceptDetailSection.style.display = 'none';
  }

  document.getElementById('overlay').style.display = 'block';
  document.getElementById('detail-panel').style.display = 'block';
  selectedTopic = topicName;
  renderTopicList();
}

function closeDetail() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('detail-panel').style.display = 'none';
  selectedTopic = null;
  renderTopicList();
}

// ===== CONCEPT FUNCTIONS =====
function toggleConceptList() {
  const list = document.getElementById('concept-list');
  const arrow = document.getElementById('concept-arrow');
  list.classList.toggle('open');
  arrow.classList.toggle('open');
}

function renderConceptList() {
  const list = document.getElementById('concept-list');
  const activeConcepts = CONCEPTS.filter(c => c.status === 'active');
  if (activeConcepts.length === 0) {
    list.innerHTML = '<li style="padding: 10px 12px; font-size: 12px; color: var(--muted);">暂无概念词条</li>';
    return;
  }
  list.innerHTML = activeConcepts.map(c => `
    <li class="concept-item" onclick="showConceptDetailFromSidebar('${c.name.replace(/'/g, "\\'")}')">
      <span class="name">${c.name}</span>
      <span class="concept-one-liner">${c.one_liner || ''}</span>
    </li>
  `).join('');
}

function showConceptDetailFromSidebar(conceptName) {
  showConceptDetail(conceptName);
}

function showConceptDetail(conceptName) {
  const concept = CONCEPTS.find(c => c.name === conceptName);
  if (!concept) return;

  const statusLabel = concept.status === 'active' ? '活跃' : concept.status === 'absorbed' ? '被吸收' : '归档';
  document.getElementById('detail-title').textContent = concept.name;
  document.getElementById('detail-desc').textContent = concept.one_liner || '';
  document.getElementById('detail-count').textContent = statusLabel;
  document.getElementById('detail-range').textContent = '';

  document.getElementById('section-topic-concept').style.display = 'none';
  document.getElementById('section-related-concepts').style.display = 'none';
  document.getElementById('section-concept-detail').style.display = '';

  let html = '';
  html += `<span class="concept-status concept-status-${concept.status || 'active'}">${statusLabel}</span>`;

  if (concept.one_liner) {
    html += `<div class="concept-detail-liner">${concept.one_liner}</div>`;
  }

  if (concept.description) {
    html += `<div class="concept-detail-desc">${concept.description}</div>`;
  }

  if (concept.scenarios && concept.scenarios.length > 0) {
    html += '<div class="detail-section-title" style="margin-top:16px;">适用场景</div>';
    html += '<ul class="concept-detail-scenarios">';
    concept.scenarios.forEach(s => {
      html += `<li>- ${s}</li>`;
    });
    html += '</ul>';
  }

  if (concept.evolution) {
    const evo = concept.evolution;
    const hasPredecessor = evo.predecessor && evo.predecessor.trim() !== '';
    const hasSuccessor = evo.successor && evo.successor.trim() !== '';
    if (hasPredecessor || hasSuccessor) {
      html += '<div class="detail-section-title" style="margin-top:16px;">演进关系</div>';
      html += '<div class="concept-evolution">';
      if (hasPredecessor) {
        html += `<span class="evo-node">${evo.predecessor}</span>`;
        html += '<span class="evo-arrow">&#8594;</span>';
      }
      html += `<span class="evo-node current">${concept.name}</span>`;
      if (hasSuccessor) {
        html += '<span class="evo-arrow">&#8594;</span>';
        html += `<span class="evo-node">${evo.successor}</span>`;
      }
      html += '</div>';
    }
  }

  if (concept.related_topics && concept.related_topics.length > 0) {
    html += '<div class="detail-section-title" style="margin-top:16px;">关联主题</div>';
    html += '<div class="concept-related-topics">';
    concept.related_topics.forEach(t => {
      html += `<span class="topic-tag" onclick="closeDetail(); setTimeout(() => selectTopic('${t.replace(/'/g, "\\'")}'), 300);">${t}</span>`;
    });
    html += '</div>';
  }

  document.getElementById('detail-concept-full').innerHTML = html;

  document.getElementById('detail-timeline').parentElement.style.display = 'none';
  document.getElementById('detail-articles').parentElement.style.display = 'none';

  document.getElementById('overlay').style.display = 'block';
  document.getElementById('detail-panel').style.display = 'block';
}

function selectTopic(name) {
  showTopicDetail(name, YEARS.find(y => {
    const t = TOPICS.find(t => t.name === name);
    return t && t.yearCounts && t.yearCounts[y] > 0;
  }) || '2024');
}

// ===== TIMELINE VIEW =====
function renderTimeline() {
  const grid = document.getElementById('matrix-grid');
  let html = '<div style="padding: 24px;">';

  YEARS.forEach(year => {
    const yearArticles = KNOWLEDGE_BASE.filter(a => (a.published_at || a.date || '').startsWith(year));
    html += `<h3 style="color: var(--accent); margin: 20px 0 12px; font-size: 18px;">${year}年</h3>`;
    html += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px;">';

    yearArticles.slice(0, 12).forEach(a => {
      html += `
        <div class="article-item" onclick="window.open('${a.url}', '_blank')" style="cursor: pointer;">
          <div class="article-item-title">${a.title}</div>
          <div class="article-item-summary">${(a.chinese_summary || a.summary || '').substring(0, 100)}...</div>
          <div class="article-item-meta">
            <span>${a.source || '未知'}</span>
            <a href="${a.url}" target="_blank" onclick="event.stopPropagation()">阅读原文 &rarr;</a>
          </div>
        </div>
      `;
    });

    html += '</div>';
  });

  html += '</div>';
  grid.innerHTML = html;
}

// ===== SEARCH =====
function doSearch() {
  const q = document.getElementById('search-input').value.toLowerCase();
  if (!q) {
    // Return to current view
    switchView(currentView, document.querySelector('#tab-nav button.active'));
    return;
  }

  // Switch to explore view to show search results
  switchView('explore', document.querySelectorAll('#tab-nav button')[2]);

  const grid = document.getElementById('matrix-grid');
  let html = '<div style="padding: 24px;">';
  html += `<h3 style="color: var(--accent); margin-bottom: 16px;">搜索结果: "${q}"</h3>`;
  html += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 12px;">';

  const results = KNOWLEDGE_BASE.filter(a =>
    (a.title || '').toLowerCase().includes(q) ||
    (a.chinese_summary || '').toLowerCase().includes(q) ||
    (a.summary || '').toLowerCase().includes(q)
  );

  results.forEach(a => {
    html += `
      <div class="article-item" onclick="window.open('${a.url}', '_blank')" style="cursor: pointer;">
        <div class="article-item-title">${a.title}</div>
        <div class="article-item-summary">${(a.chinese_summary || a.summary || '').substring(0, 120)}...</div>
        <div class="article-item-meta">
          <span>${a.source || '未知'}</span>
          <span>${a.published_at || a.date || ''}</span>
          <a href="${a.url}" target="_blank" onclick="event.stopPropagation()">阅读原文 &rarr;</a>
        </div>
      </div>
    `;
  });

  html += '</div></div>';
  grid.innerHTML = html;
}

// ===== LOAD DATA =====
async function loadData() {
  if (KNOWLEDGE_BASE.length === 0) {
    document.getElementById('briefing-grid').innerHTML = `
      <div style="padding: 60px; text-align: center; color: var(--muted);">
        <div style="font-size: 48px; margin-bottom: 16px;">&#128218;</div>
        <div style="font-size: 16px; margin-bottom: 8px;">知识库暂无数据</div>
        <div style="font-size: 13px;">请运行 update_dashboard.py 生成数据</div>
      </div>
    `;
    return;
  }

  // Update stats
  document.getElementById('stat-total').textContent = KNOWLEDGE_BASE.length;
  document.getElementById('stat-topics').textContent = TOPICS.length;

  renderTopicList();
  renderConceptList();

  // Default: render weekly briefing
  renderWeeklyBriefing();
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', loadData);

document.getElementById('search-input')?.addEventListener('keypress', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
